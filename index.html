<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Kapandı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0d0d0d;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        .background-404 {
            position: absolute;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            user-select: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .dev {
            margin-bottom: 30px;
            font-size: 1rem;
            color: #ff4757;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Buton Stili */
        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            text-transform: uppercase;
            color: #fff;
            background-color: transparent;
            border: 2px solid #3498db;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #3498db;
            color: #000;
            box-shadow: 0 0 15px #3498db;
        }
    </style>
</head>
<body>

    <div class="background-404">404</div>

    <div class="content">
        <h1>KAPANDI</h1>
        <div class="dev">YAPIMCI: STRYKER</div>
        
        <a href="javascript:alert('Sebeb: Tartışma')" class="btn">SEBEB</a>
    </div>

</body>
</html>
