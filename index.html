<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Kapandı</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        .background-404 {
            position: absolute;
            font-size: 30vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dev {
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #ff4757;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1rem;
            color: #3498db;
            background-color: transparent;
            border: 2px solid #3498db;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: #3498db;
            color: #fff;
            box-shadow: 0 0 30px #3498db;
        }

        /* Modal Stili */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border: 1px solid #3498db;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="background-404">404</div>

    <div class="content">
        <h1>KAPANDI</h1>
        <div class="dev">YAPIMCI: STRYKER</div>
        <button class="btn" onclick="document.getElementById('modal').style.display='flex'">SEBEB</button>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <h2 style="color: #3498db;">Kapanma Nedeni</h2>
            <p>Bu site, yaşanan bazı tartışmalar sebebiyle süresiz olarak erişime kapatılmıştır.</p>
            <small>(Kapatmak için tıklayın)</small>
        </div>
    </div>

</body>
</html>
